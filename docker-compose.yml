name: detailing-studio

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      DEFAULT_DB: ${DEFAULT_DB:-detailing}
      POSTGRES_DB: ${DEFAULT_DB:-detailing}
      POSTGRES_USER: ${POSTGRES_USER:-detailing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-placeholder}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-placeholder}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-placeholder}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2024-07-15T19-02-30Z
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-placeholder}
      MINIO_BUCKET: ${MINIO_BUCKET:-photos}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc anonymous set download "local/$${MINIO_BUCKET}"
        tail -f /dev/null
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" >/dev/null 2>&1 && mc ls \"local/$${MINIO_BUCKET}\" >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILHOG_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILHOG_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8025"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s

volumes:
  postgres-data:
  redis-data:
  minio-data:
