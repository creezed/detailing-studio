name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: detailing
          POSTGRES_USER: app
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive nx command
        id: nx
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "cmd=run-many" >> "$GITHUB_OUTPUT"
            echo "args=--all" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=affected" >> "$GITHUB_OUTPUT"
            echo "args=--base=origin/main --head=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        run: pnpm exec nx ${{ steps.nx.outputs.cmd }} --target=lint --parallel=3 ${{ steps.nx.outputs.args }}

      - name: TypeCheck
        run: pnpm exec nx ${{ steps.nx.outputs.cmd }} --target=typecheck ${{ steps.nx.outputs.args }}

      - name: Test
        run: pnpm exec nx ${{ steps.nx.outputs.cmd }} --target=test --parallel=3 ${{ steps.nx.outputs.args }}
        env:
          POSTGRES_PASSWORD: ci-password
          REDIS_PASSWORD: ''

      - name: Build
        run: pnpm exec nx ${{ steps.nx.outputs.cmd }} --target=build ${{ steps.nx.outputs.args }}
