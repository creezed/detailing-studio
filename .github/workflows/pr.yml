name: PR Verification

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  verify:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: detailing_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d detailing_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (includes enforce-module-boundaries)
        run: pnpm nx affected -t lint --parallel=3

      - name: Typecheck
        run: pnpm nx affected -t typecheck --parallel=3

      - name: Unit & integration tests
        run: pnpm nx affected -t test --parallel=3 --ci --code-coverage
        env:
          TEST_DATABASE_URL: postgres://test:test@localhost:5432/detailing_test

      - name: Check coverage threshold
        run: |
          pnpm nx affected -t test --parallel=3 --ci --code-coverage \
            --coverageReporters=json-summary 2>/dev/null || true

          node scripts/check-coverage.mjs

      - name: Build
        run: pnpm nx affected -t build --parallel=3

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
