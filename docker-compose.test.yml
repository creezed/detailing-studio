name: detailing-studio-test

services:
  postgres-test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      DEFAULT_DB: ${TEST_DEFAULT_DB:-detailing_test}
      POSTGRES_DB: ${TEST_DEFAULT_DB:-detailing_test}
      POSTGRES_USER: ${TEST_POSTGRES_USER:-detailing_test}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-placeholder}
    ports:
      - "127.0.0.1:${TEST_POSTGRES_PORT:-15432}:5432"
    tmpfs:
      - /var/lib/postgresql/data:size=512m,mode=0700
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis-test:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --save '' --appendonly no --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${TEST_REDIS_PASSWORD:-placeholder}
    ports:
      - "127.0.0.1:${TEST_REDIS_PORT:-16379}:6379"
    tmpfs:
      - /data:size=128m,mode=0755
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
